<html lang="pt-BR">

        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
        <link rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <style>
:root {
  --bg: #f8fafc;
  --header-bg: rgba(255, 255, 255, 0.78);
  --header-border: rgba(15, 23, 42, 0.06);
  --text: #0f172a;
  --text-muted: #64748b;
  --text-soft: #94a3b8;
  --border: #e2e8f0;
  --border-strong: #cbd5e1;
  --primary: #4f46e5;
  --primary-soft: rgba(79, 70, 229, 0.08);
  --primary-hover: #4338ca;
  --surface: #ffffff;
  --surface-soft: #f8fafc;
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-md: 0 4px 14px rgba(15, 23, 42, 0.08);
  --shadow-lg: 0 16px 40px rgba(15, 23, 42, 0.14);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--bg);
}

/* ============ HEADER (glassmorphism) ============ */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  background: var(--header-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--header-border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 12px;
  z-index: 1000;
  overflow-x: auto;
  overflow-y: visible;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-right: 14px;
  margin-right: 4px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}

.brand-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  border-radius: 8px;
  box-shadow: 0 4px 10px rgba(79, 70, 229, 0.25);
}

.brand-icon svg { width: 18px; height: 18px; color: white; }

.brand-text {
  display: flex; flex-direction: column; line-height: 1.15;
}

.brand-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

.brand-sub {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.02em;
}

.filters {
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}

/* ============ MULTI-SELECT ============ */
.multi-select {
  position: relative;
  flex-shrink: 0;
}

.ms-trigger {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  min-width: 150px;
  height: 40px;
  transition: all 0.15s ease;
  box-shadow: var(--shadow-sm);
  position: relative;
}

.ms-trigger:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-md);
}

.ms-trigger.open {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
}

.ms-trigger-content {
  display: flex;
  flex-direction: column;
  flex: 1;
  align-items: flex-start;
  line-height: 1.2;
  overflow: hidden;
}

.ms-label {
  font-size: 9.5px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.ms-summary {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  display: flex;
  align-items: center;
  gap: 5px;
}

.ms-summary.placeholder {
  color: var(--text-soft);
  font-weight: 400;
}

.ms-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--primary);
  color: white;
  font-weight: 700;
  font-size: 10px;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
}

.ms-caret {
  color: var(--text-muted);
  transition: transform 0.2s ease;
  flex-shrink: 0;
}

.ms-trigger.open .ms-caret { transform: rotate(180deg); color: var(--primary); }

.ms-panel {
  position: fixed; /* escapa do overflow do header */
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  min-width: 260px;
  max-width: 340px;
  width: max-content;
  z-index: 100000; /* portal no body — fica acima de tudo */
  overflow: hidden;
  animation: msIn 0.18s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes msIn {
  from { opacity: 0; transform: translateY(-6px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.ms-search-wrap {
  padding: 10px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.ms-search-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-soft);
  pointer-events: none;
}

.ms-search {
  width: 100%;
  padding: 8px 10px 8px 30px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 12px;
  outline: none;
  background: var(--surface-soft);
  transition: all 0.15s;
}

.ms-search:focus {
  border-color: var(--primary);
  background: var(--surface);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
}

.ms-actions {
  display: flex;
  gap: 4px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  background: var(--surface-soft);
}

.ms-action {
  font-family: inherit;
  font-size: 11px;
  font-weight: 600;
  color: var(--primary);
  background: transparent;
  border: none;
  padding: 5px 9px;
  cursor: pointer;
  border-radius: 5px;
  transition: background 0.12s;
}

.ms-action:hover { background: var(--primary-soft); }
.ms-action.muted { color: var(--text-muted); }
.ms-action.muted:hover { background: rgba(15, 23, 42, 0.05); color: var(--text); }

.ms-count {
  margin-left: auto;
  font-size: 10.5px;
  color: var(--text-muted);
  font-weight: 500;
  align-self: center;
  padding-right: 4px;
}

.ms-options {
  max-height: 280px;
  overflow-y: auto;
  padding: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-strong) transparent;
}
.ms-options::-webkit-scrollbar { width: 6px; }
.ms-options::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

.ms-option {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 7px 8px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
}

.ms-option:hover { background: #f1f5f9; }
.ms-option.selected { background: var(--primary-soft); }

.ms-check {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: white;
  background: var(--surface);
  transition: all 0.15s;
}

.ms-option.selected .ms-check {
  background: var(--primary);
  border-color: var(--primary);
}

.ms-check svg { opacity: 0; transition: opacity 0.12s; }
.ms-option.selected .ms-check svg { opacity: 1; }

.ms-text {
  font-size: 12.5px;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 500;
}

.ms-empty {
  padding: 24px 16px;
  text-align: center;
  color: var(--text-soft);
  font-size: 12px;
}

/* ============ ACTION TEXT LINKS ============ */
.actions-stack {
  display: flex;
  flex-direction: column;
  gap: 1px;
  padding-left: 12px;
  margin-left: 4px;
  border-left: 1px solid var(--border);
  flex-shrink: 0;
}

.text-link {
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  padding: 3px 8px;
  border-radius: 5px;
  text-decoration: none;
  transition: all 0.15s;
  user-select: none;
  letter-spacing: -0.005em;
  display: inline-block;
}

#btn-aplica { color: var(--primary); }
#btn-aplica:hover { background: var(--primary-soft); }

#btn-limpar { color: var(--text-muted); }
#btn-limpar:hover { background: rgba(15, 23, 42, 0.05); color: var(--text); }

.text-link.busy { color: var(--text-soft) !important; pointer-events: none; cursor: wait; }

/* ============ RAIOS BUTTON ============ */
#btn-raios {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  height: 40px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(16, 185, 129, 0.25);
  transition: all 0.15s;
  flex-shrink: 0;
  letter-spacing: -0.005em;
}

#btn-raios:hover {
  box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35);
  transform: translateY(-1px);
}

#btn-raios.active {
  background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3);
}

#btn-raios.active:hover {
  box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
}

/* ============ MAP ============ */
#map {
  position: fixed;
  top: 64px; left: 0; right: 0; bottom: 0;
  width: 100%;
  height: calc(100% - 64px);
  z-index: 0;
}

/* Popup refinements */
.leaflet-popup-content-wrapper {
  border-radius: var(--radius) !important;
  box-shadow: var(--shadow-lg) !important;
  border: 1px solid var(--border) !important;
}

.leaflet-popup-content {
  font-size: 12.5px !important;
  margin: 12px 14px !important;
  font-family: 'Inter', sans-serif !important;
}

.leaflet-popup-tip {
  box-shadow: var(--shadow-md) !important;
}

.loja-pin, .cd-pin { background: transparent !important; border: none !important; }

/* Route tooltip */
.leaflet-tooltip {
  background: rgba(15, 23, 42, 0.95) !important;
  color: white !important;
  border: none !important;
  border-radius: 6px !important;
  font-family: 'Inter', sans-serif !important;
  font-size: 11.5px !important;
  font-weight: 500 !important;
  padding: 6px 10px !important;
  box-shadow: var(--shadow-md) !important;
}

.leaflet-tooltip-top:before,
.leaflet-tooltip-bottom:before { border-top-color: rgba(15, 23, 42, 0.95) !important; }

/* Tooltip da loja (hover do pin) — estilo balão branco */
.leaflet-tooltip.loja-tooltip {
  background: white !important;
  color: #0f172a !important;
  border: 1px solid var(--border) !important;
  border-radius: 10px !important;
  padding: 8px 11px !important;
  box-shadow: var(--shadow-lg) !important;
  min-width: 180px !important;
  max-width: 280px !important;
}
.leaflet-tooltip.loja-tooltip.leaflet-tooltip-top:before { border-top-color: white !important; }
.leaflet-tooltip.loja-tooltip.leaflet-tooltip-bottom:before { border-bottom-color: white !important; }

/* Scrollbar for header on mobile */
#header::-webkit-scrollbar { display: none; }
#header { scrollbar-width: none; }
</style>

// ============================================
// HELPERS
// ============================================
function getColor(agrupamento) {
  // Hash determinístico → cor consistente para PIN e ROTA
  const hash = agrupamento.split('').reduce((h, c) => h + c.charCodeAt(0), 0);
  const hue = hash % 360;
  return `hsl(${hue}, 68%, 48%)`;
}

function haversine(a, b) {
  const R = 6371, toRad = x => x * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLng = toRad(b.lng - a.lng);
  const lat1 = toRad(a.lat), lat2 = toRad(b.lat);
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function nearestNeighborOrder(start, points) {
  const remaining = [...points], ordered = [];
  let current = start;
  while (remaining.length) {
    let minIdx = 0, minDist = haversine(current, remaining[0]);
    for (let i = 1; i < remaining.length; i++) {
      const d = haversine(current, remaining[i]);
      if (d < minDist) { minDist = d; minIdx = i; }
    }
    current = remaining[minIdx];
    ordered.push(current);
    remaining.splice(minIdx, 1);
  }
  return ordered;
}

// ============================================
// MULTI-SELECT COMPONENT
// ============================================
const allMultiSelects = [];

class MultiSelect {
  constructor(root, label, onChange) {
    this.root = root;
    this.label = label;
    this.onChange = onChange;
    this.options = [];
    this.selected = new Set();
    this.searchTerm = '';
    this.isOpen = false;
    this.build();
    allMultiSelects.push(this);
  }

  build() {
    // TRIGGER fica dentro do header (.root)
    this.root.innerHTML = `
      <button class="ms-trigger" type="button">
        <div class="ms-trigger-content">
          <span class="ms-label">${this.label}</span>
          <span class="ms-summary placeholder">Todos</span>
        </div>
        <svg class="ms-caret" viewBox="0 0 12 12" width="11" height="11">
          <path d="M2.5 4.5L6 8l3.5-3.5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    `;

    // PAINEL é criado FORA do header (portal direto no body)
    // para escapar do stacking context criado por backdrop-filter.
    this.panel = document.createElement('div');
    this.panel.className = 'ms-panel';
    this.panel.hidden = true;
    this.panel.innerHTML = `
      <div class="ms-search-wrap">
        <svg class="ms-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
        </svg>
        <input class="ms-search" type="text" placeholder="Buscar...">
      </div>
      <div class="ms-actions">
        <button class="ms-action ms-all" type="button">Selecionar todos</button>
        <button class="ms-action muted ms-clear" type="button">Limpar</button>
        <span class="ms-count"></span>
      </div>
      <div class="ms-options"></div>
    `;
    document.body.appendChild(this.panel);

    this.trigger = this.root.querySelector('.ms-trigger');
    this.summary = this.root.querySelector('.ms-summary');
    this.searchInput = this.panel.querySelector('.ms-search');
    this.optionsEl = this.panel.querySelector('.ms-options');
    this.countEl = this.panel.querySelector('.ms-count');

    this.trigger.addEventListener('click', e => { e.stopPropagation(); this.toggle(); });
    this.searchInput.addEventListener('input', e => { this.searchTerm = e.target.value.toLowerCase(); this.renderOptions(); });
    this.searchInput.addEventListener('click', e => e.stopPropagation());
    this.panel.addEventListener('click', e => e.stopPropagation());
    this.panel.addEventListener('mousedown', e => e.stopPropagation());

    this.panel.querySelector('.ms-all').addEventListener('click', () => {
      const visible = this.getFilteredOptions();
      visible.forEach(o => this.selected.add(o.value));
      this.render(); this.onChange();
    });
    this.panel.querySelector('.ms-clear').addEventListener('click', () => {
      this.selected.clear();
      this.render(); this.onChange();
    });
  }

  setOptions(options) {
    this.options = options;
    const valid = new Set(options.map(o => o.value));
    this.selected = new Set([...this.selected].filter(v => valid.has(v)));
    this.render();
  }

  getSelected() { return [...this.selected]; }

  reset() { this.selected.clear(); this.render(); }

  getFilteredOptions() {
    return this.options.filter(o => !this.searchTerm || o.text.toLowerCase().includes(this.searchTerm));
  }

  open() {
    this.isOpen = true;
    this.panel.hidden = false;
    this.trigger.classList.add('open');
    this.positionPanel();
    setTimeout(() => this.searchInput.focus(), 50);

    // reposiciona em scroll/resize enquanto aberto
    this._reposition = () => this.positionPanel();
    window.addEventListener('resize', this._reposition);
    window.addEventListener('scroll', this._reposition, true);
  }

  positionPanel() {
    const rect = this.trigger.getBoundingClientRect();
    const panelMaxW = 340;
    const margin = 8;
    let left = rect.left;
    // se passar da direita da janela, alinha pela direita do trigger
    if (left + panelMaxW + margin > window.innerWidth) {
      left = Math.max(margin, rect.right - panelMaxW);
    }
    this.panel.style.top = (rect.bottom + 6) + 'px';
    this.panel.style.left = left + 'px';
  }

  close() {
    if (!this.isOpen) return;
    this.isOpen = false;
    this.panel.hidden = true;
    this.trigger.classList.remove('open');
    this.searchTerm = '';
    this.searchInput.value = '';
    if (this._reposition) {
      window.removeEventListener('resize', this._reposition);
      window.removeEventListener('scroll', this._reposition, true);
      this._reposition = null;
    }
  }

  toggle() {
    allMultiSelects.forEach(m => { if (m !== this) m.close(); });
    this.isOpen ? this.close() : this.open();
  }

  render() {
    this.renderSummary();
    this.renderOptions();
    this.countEl.textContent = `${this.options.length} ${this.options.length === 1 ? 'item' : 'itens'}`;
  }

  renderSummary() {
    const arr = [...this.selected];
    if (arr.length === 0) {
      this.summary.textContent = 'Todos';
      this.summary.classList.add('placeholder');
    } else if (arr.length === 1) {
      const opt = this.options.find(o => o.value === arr[0]);
      this.summary.textContent = opt ? opt.text : arr[0];
      this.summary.classList.remove('placeholder');
    } else {
      this.summary.innerHTML = `<span class="ms-chip">${arr.length}</span> <span>selecionados</span>`;
      this.summary.classList.remove('placeholder');
    }
  }

  renderOptions() {
    const filtered = this.getFilteredOptions();
    if (filtered.length === 0) {
      this.optionsEl.innerHTML = '<div class="ms-empty">Nenhum resultado</div>';
      return;
    }
    this.optionsEl.innerHTML = filtered.map((o, i) => `
      <div class="ms-option ${this.selected.has(o.value) ? 'selected' : ''}" data-i="${i}">
        <span class="ms-check">
          <svg viewBox="0 0 12 12" width="11" height="11">
            <path d="M2.5 6.5l2.5 2.5 4.5-5.5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="ms-text">${o.text}</span>
      </div>
    `).join('');

    this.optionsEl.querySelectorAll('.ms-option').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const opt = filtered[+el.dataset.i];
        if (this.selected.has(opt.value)) this.selected.delete(opt.value);
        else this.selected.add(opt.value);
        this.render();
        this.onChange();
      });
    });
  }
}

// ============================================
// FILTERS WIRING (com cascata)
// ============================================
const filters = {};

function initFilters() {
  filters.estado = new MultiSelect(document.getElementById('ms-estado'), 'Estado', onEstadoChange);
  filters.cidade = new MultiSelect(document.getElementById('ms-cidade'), 'Cidade', onCidadeChange);
  filters.agrupamento = new MultiSelect(document.getElementById('ms-agrupamento'), 'Agrupamento', onAgrupamentoChange);
  filters.loja = new MultiSelect(document.getElementById('ms-loja'), 'Loja', () => {});

  // Popular estado inicial
  refreshEstadoOptions();
  refreshCidadeOptions();
  refreshAgrupamentoOptions();
  refreshLojaOptions();
}

function refreshEstadoOptions() {
  const estados = [...new Set(LOJAS.map(l => l.estado))].sort();
  filters.estado.setOptions(estados.map(e => ({ value: e, text: e })));
}

function refreshCidadeOptions() {
  const est = filters.estado.getSelected();
  const cidades = [...new Set(
    LOJAS.filter(l => est.length === 0 || est.includes(l.estado)).map(l => l.cidade)
  )].sort();
  filters.cidade.setOptions(cidades.map(c => ({ value: c, text: c })));
}

function refreshAgrupamentoOptions() {
  const est = filters.estado.getSelected();
  const cid = filters.cidade.getSelected();
  const agrups = [...new Set(
    LOJAS.filter(l =>
      (est.length === 0 || est.includes(l.estado)) &&
      (cid.length === 0 || cid.includes(l.cidade))
    ).map(l => l.agrupamento)
  )].sort();
  filters.agrupamento.setOptions(agrups.map(a => ({ value: a, text: a })));
}

function refreshLojaOptions() {
  const est = filters.estado.getSelected();
  const cid = filters.cidade.getSelected();
  const agr = filters.agrupamento.getSelected();
  const lojas = LOJAS.filter(l =>
    (est.length === 0 || est.includes(l.estado)) &&
    (cid.length === 0 || cid.includes(l.cidade)) &&
    (agr.length === 0 || agr.includes(l.agrupamento))
  ).sort((a, b) => a.razao.localeCompare(b.razao));
  filters.loja.setOptions(lojas.map(l => ({ value: l.filial, text: `${l.razao} (${l.filial})` })));
}

function onEstadoChange() { refreshCidadeOptions(); refreshAgrupamentoOptions(); refreshLojaOptions(); }
function onCidadeChange() { refreshAgrupamentoOptions(); refreshLojaOptions(); }
function onAgrupamentoChange() { refreshLojaOptions(); }

// ============================================
// APPLY FILTERS
// ============================================
function applyFilters() {
  const est = filters.estado.getSelected();
  const cid = filters.cidade.getSelected();
  const agr = filters.agrupamento.getSelected();
  const fil = filters.loja.getSelected();

  state.filteredLojas = LOJAS.filter(l =>
    (est.length === 0 || est.includes(l.estado)) &&
    (cid.length === 0 || cid.includes(l.cidade)) &&
    (agr.length === 0 || agr.includes(l.agrupamento)) &&
    (fil.length === 0 || fil.includes(l.filial))
  );

  renderMarkers();
  drawRoutes();

  if (state.filteredLojas.length > 0) {
    const pts = [[CD.lat, CD.lng], ...state.filteredLojas.map(l => [l.lat, l.lng])];
    state.map.fitBounds(L.latLngBounds(pts), { padding: [80, 80] });
  }
}

      tooltipHTML = `
        <div style="font-weight:700;font-size:12px;line-height:1.3;">${loja.razao}</div>
        <div style="margin-top:3px;font-size:11px;display:flex;align-items:center;gap:5px;">
          <span style="background:${leg.color};color:white;padding:1px 6px;border-radius:8px;font-weight:700;font-size:10.5px;">${km} km</span>
          <span style="opacity:.85;">do ${leg.prevType === 'CD' ? 'CD' : leg.prevName}</span>
        </div>
      `;
    } else {
      tooltipHTML = `
        <div style="font-weight:700;font-size:12px;line-height:1.3;">${loja.razao}</div>
        <div style="margin-top:3px;font-size:10.5px;opacity:.7;font-style:italic;">Clique em Aplicar para ver a distância</div>
      `;
    }

    const popupContent = `
      <div style="min-width:250px;max-width:310px;line-height:1.5;">
        <div style="font-weight:700;font-size:13.5px;color:#0f172a;border-left:3px solid ${color};padding-left:9px;">${loja.razao}</div>
        ${legBlockHTML}
        <div style="display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:11.5px;${leg ? '' : 'margin-top:8px;'}">
          <span style="color:#64748b;">Filial</span><span style="font-weight:500;">#${loja.filial}</span>
          <span style="color:#64748b;">CEP</span><span>${loja.cep}</span>
          <span style="color:#64748b;">Endereço</span><span>${loja.endereco}</span>
          <span style="color:#64748b;">Bairro</span><span>${loja.bairro}</span>
          <span style="color:#64748b;">Cidade/UF</span><span>${loja.cidade} - ${loja.estado}</span>
          <span style="color:#64748b;">Agrupamento</span><span style="color:${color};font-weight:600;">${loja.agrupamento}</span>
          <span style="color:#64748b;">Km~</span><span>${loja.km}</span>
          <span style="color:#64748b;">Conjugar</span><span>${loja.conjugar}</span>
          <span style="color:#64748b;">Ativo</span><span>${loja.ativo}</span>
          <span style="color:#64748b;">Veículo</span><span>${loja.veiculo}</span>
          <span style="color:#64748b;">Pegada</span><span>${loja.pegada}</span>
          <span style="color:#64748b;">Lat,Lng</span><span style="font-family:monospace;font-size:10.5px;">${loja.lat.toFixed(5)}, ${loja.lng.toFixed(5)}</span>
        </div>
      </div>
    `;
    marker.bindPopup(popupContent);

    // Tooltip de hover (nome + distância)
    marker.bindTooltip(tooltipHTML, {
      direction: 'top',
      offset: [0, -18],
      opacity: 1,
      className: 'loja-tooltip'
    });

    marker.on('mouseover', function() {
      if (!state.showRadii) {
        this._hoverCircle = L.circle([loja.lat, loja.lng], {
          radius: 10000, color: color, weight: 1, fill: false, opacity: 0.6
        }).addTo(state.layers.markers);
      }
    });
    marker.on('mouseout', function() {
      if (this._hoverCircle) {
        state.layers.markers.removeLayer(this._hoverCircle);
        delete this._hoverCircle;
      }
    });
  });
}

// ============================================
// ROTAS REAIS via OSRM (uma por agrupamento, cor = cor do pin)
// ============================================
const OSRM_BASE = 'https://router.project-osrm.org/route/v1/driving/';

async function fetchOSRMRoute(waypoints) {
  const coordStr = waypoints.map(p => `${p.lng},${p.lat}`).join(';');
  const url = `${OSRM_BASE}${coordStr}?overview=full&geometries=geojson&steps=false`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('OSRM HTTP ' + resp.status);
  const data = await resp.json();
  if (data.code !== 'Ok' || !data.routes?.length) throw new Error('OSRM no route');
  return data.routes[0];
}

async function pMapLimit(items, limit, fn) {
  const results = new Array(items.length);
  let i = 0;
  async function worker() {
    while (i < items.length) {
      const idx = i++;
      try { results[idx] = { ok: true, value: await fn(items[idx], idx) }; }
      catch (e) { results[idx] = { ok: false, error: e }; }
    }
  }
  await Promise.all(Array.from({ length: Math.min(limit, items.length) }, worker));
  return results;
}

let drawRoutesToken = 0;

async function drawRoutes() {
  state.layers.routes.clearLayers();
  state.legInfo = {}; // reseta distâncias a cada novo Aplicar
  const myToken = ++drawRoutesToken;

  // Agrupar por agrupamento → uma rota por agrupamento
  const groups = {};
  state.filteredLojas.forEach(l => {
    (groups[l.agrupamento] = groups[l.agrupamento] || []).push(l);
  });
  const entries = Object.entries(groups);
  if (entries.length === 0) return;

  setBusy(true, `Calculando ${entries.length} rota${entries.length > 1 ? 's' : ''}…`);

  await pMapLimit(entries, 4, async ([agrupamento, lojas]) => {
    const color = getColor(agrupamento); // MESMA cor do pin
    const ordered = nearestNeighborOrder({ lat: CD.lat, lng: CD.lng }, lojas);
    const waypoints = [{ lat: CD.lat, lng: CD.lng }, ...ordered.map(l => ({ lat: l.lat, lng: l.lng }))];

    try {
      const route = await fetchOSRMRoute(waypoints);
      if (myToken !== drawRoutesToken) return;

      // Guarda distância real (por perna) de cada loja
      // route.legs[i] = trecho entre waypoint[i] e waypoint[i+1]
      ordered.forEach((loja, i) => {
        const leg = route.legs && route.legs[i];
        if (!leg) return;
        const prevName = i === 0 ? CD.nome : ordered[i-1].razao;
        const prevType = i === 0 ? 'CD' : 'loja';
        state.legInfo[loja.filial] = {
          distMeters: leg.distance,
          durSeconds: leg.duration,
          prevName, prevType, source: 'osrm', color
        };
      });

      const latlngs = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);
      const km = (route.distance / 1000).toFixed(0);
      const h = Math.floor(route.duration / 3600);
      const m = Math.round((route.duration % 3600) / 60);

      L.polyline(latlngs, {
        color: color, weight: 4, opacity: 0.82, lineJoin: 'round', lineCap: 'round'
      })
      .bindTooltip(`<strong>${agrupamento}</strong><br>${lojas.length} loja${lojas.length > 1 ? 's' : ''} · ${km} km · ${h}h${String(m).padStart(2,'0')}`, { sticky: true })
      .addTo(state.layers.routes);
    } catch (e) {
      console.warn('OSRM falhou para', agrupamento, '—', e.message);
      if (myToken !== drawRoutesToken) return;

      // Fallback: usa haversine para preencher legInfo também
      ordered.forEach((loja, i) => {
        const prev = i === 0
          ? { lat: CD.lat, lng: CD.lng, name: CD.nome, type: 'CD' }
          : { lat: ordered[i-1].lat, lng: ordered[i-1].lng, name: ordered[i-1].razao, type: 'loja' };
        const distM = haversine(prev, loja) * 1000;
        state.legInfo[loja.filial] = {
          distMeters: distM, durSeconds: null,
          prevName: prev.name, prevType: prev.type,
          source: 'haversine', color
        };
      });

      const fallback = waypoints.map(p => [p.lat, p.lng]);
      let total = 0;
      for (let i = 1; i < waypoints.length; i++) total += haversine(waypoints[i-1], waypoints[i]);

      L.polyline(fallback, { color: color, weight: 2.5, opacity: 0.55, dashArray: '5, 6' })
        .bindTooltip(`<strong>${agrupamento}</strong><br>${lojas.length} loja(s) · ${total.toFixed(0)} km <em>(linha reta — rota indisponível)</em>`, { sticky: true })
        .addTo(state.layers.routes);
    }
  });

  if (myToken === drawRoutesToken) {
    setBusy(false);
    renderMarkers(); // re-renderiza popups/tooltips com as distâncias reais
  }
}

// ============================================
// CLEAR ALL
// ============================================
function clearAll() {
  drawRoutesToken++;
  state.layers.routes.clearLayers();
  state.legInfo = {};

  filters.estado.reset();
  filters.cidade.reset();
  filters.agrupamento.reset();
  filters.loja.reset();
  refreshCidadeOptions(); refreshAgrupamentoOptions(); refreshLojaOptions();

  state.filteredLojas = LOJAS;
  renderMarkers();

  if (state.showRadii) toggleRadii();

  const bounds = L.latLngBounds([[CD.lat, CD.lng], ...LOJAS.map(l => [l.lat, l.lng])]);
  state.map.fitBounds(bounds, { padding: [80, 80] });
  setBusy(false);
}

// ============================================
// RAIOS
// ============================================
function toggleRadii() {
  state.showRadii = !state.showRadii;
  const btn = document.getElementById('btn-raios');

  if (state.showRadii) {
    btn.classList.add('active');
    state.filteredLojas.forEach(loja => {
      const color = getColor(loja.agrupamento);
      const isSpecial = loja.razao.startsWith('SP-SPO') || loja.razao.startsWith('RJ-RIO');
      const radius = isSpecial ? 2000 : 10000;
      const circle = L.circle([loja.lat, loja.lng], {
        radius, color, weight: 1, fillColor: color, fillOpacity: 0.08, interactive: false
      }).addTo(state.layers.radii);
      state.radiiMarkers.push(circle);
    });
  } else {
    btn.classList.remove('active');
    state.radiiMarkers.forEach(c => state.layers.radii.removeLayer(c));
    state.radiiMarkers = [];
  }
}

// ============================================
// UI BUSY
// ============================================
function setBusy(on, label) {
  const a = document.getElementById('btn-aplica');
  if (on) {
    a.dataset.original = a.dataset.original || a.textContent;
    a.textContent = label || 'Calculando…';
    a.classList.add('busy');
  } else {
    if (a.dataset.original) a.textContent = a.dataset.original;
    a.classList.remove('busy');
  }
}

// ============================================
// INIT
// ============================================
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  initFilters();
  renderMarkers();

  document.getElementById('btn-aplica').addEventListener('click', e => { e.preventDefault(); applyFilters(); });
  document.getElementById('btn-limpar').addEventListener('click', e => { e.preventDefault(); clearAll(); });
  document.getElementById('btn-raios').addEventListener('click', toggleRadii);

  // Click fora fecha multi-selects
  document.addEventListener('click', () => {
    allMultiSelects.forEach(m => m.close());
  });

  // ESC fecha multi-selects
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') allMultiSelects.forEach(m => m.close());
  });
});
